<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🇪🇸 Barcelona 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0e1a;--surface:#131829;--surface2:#1a2035;--border:#252d45;--text:#e8eaf0;--text2:#8892b0;--accent:#ff6b6b;--accent2:#4ecdc4;--hour-h:60px}
body{font-family:'Poppins',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse at 20% 50%,rgba(91,141,239,.06) 0%,transparent 50%),radial-gradient(ellipse at 80% 20%,rgba(168,85,247,.06) 0%,transparent 50%);pointer-events:none;z-index:0}

.top-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 20px;position:sticky;top:0;z-index:100;backdrop-filter:blur(20px)}
.top-bar-inner{max-width:1600px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.top-bar h1{font-size:1.3rem;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.top-bar .dates{font-size:.8rem;color:var(--text2);font-weight:500}

/* Mobile day tabs */
.day-tabs{display:none;overflow-x:auto;-webkit-overflow-scrolling:touch;gap:8px;padding:12px 16px 0;position:sticky;top:52px;z-index:99;background:var(--bg)}
.day-tab{flex-shrink:0;padding:10px 20px;border-radius:12px;background:var(--surface);border:1px solid var(--border);color:var(--text2);font-family:'Poppins',sans-serif;font-size:.75rem;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap;display:flex;align-items:center;gap:6px;position:relative;overflow:hidden;min-height:40px}
.day-tab .tab-photo{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;opacity:.25;transition:opacity .3s}
.day-tab.active .tab-photo{opacity:.5}
.day-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.day-tab .tab-text{position:relative;z-index:1}

.calendar-wrap{max-width:1600px;margin:0 auto;padding:16px;position:relative;z-index:1}

/* === GRID VIEW === */
.grid-container{display:grid;grid-template-columns:50px repeat(4,1fr);gap:0;border-radius:16px;overflow:hidden;background:var(--surface);border:1px solid var(--border)}

/* Corner cell */
.grid-corner{background:var(--surface);border-bottom:1px solid var(--border);border-right:1px solid var(--border);height:var(--hour-h);display:flex;align-items:center;justify-content:center;font-size:.55rem;color:var(--text2)}

/* Day headers */
.grid-day-header{background:var(--surface);border-bottom:1px solid var(--border);padding:8px 4px;text-align:center;height:100px;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden}
.grid-day-header .dh-photo{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;opacity:.4;transition:opacity .3s}
.grid-day-header:hover .dh-photo{opacity:.6}
.grid-day-header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:70%;background:linear-gradient(transparent,var(--surface));z-index:1}
.grid-day-header .dh-name{font-size:.6rem;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;color:var(--text2);position:relative;z-index:2}
.grid-day-header .dh-num{font-size:1.4rem;font-weight:900;line-height:1.1;position:relative;z-index:2}
.grid-day-header .dh-month{font-size:.65rem;color:var(--text2);font-weight:500;position:relative;z-index:2}

/* Day header colours */
.grid-day-header:nth-child(2){border-right:1px solid var(--border)}
.grid-day-header:nth-child(3){border-right:1px solid var(--border)}
.grid-day-header:nth-child(4){border-right:1px solid var(--border)}

/* Time label cells */
.grid-time{background:var(--surface);border-right:1px solid var(--border);border-bottom:1px solid rgba(255,255,255,.03);height:var(--hour-h);display:flex;align-items:flex-start;justify-content:flex-end;padding:4px 8px 0 0;font-size:.6rem;color:var(--text2);opacity:.5}

/* Hour cells */
.grid-hour{border-right:1px solid var(--border);border-bottom:1px solid rgba(255,255,255,.03);height:var(--hour-h);position:relative}
.grid-hour:nth-child(odd){background:rgba(255,255,255,.01)}
/* Remove right border from last day column */
.grid-hour:nth-child(4n){border-right:none}

/* Events positioned absolutely within their day column */
.grid-event{position:absolute;left:3px;right:3px;border-radius:10px;padding:6px 10px;overflow:hidden;cursor:pointer;z-index:10;text-decoration:none;color:#fff;transition:transform .15s,box-shadow .15s;display:flex;flex-direction:column;justify-content:center;animation:eventPop .4s ease both}
.grid-event:hover{transform:scale(1.03);box-shadow:0 6px 24px rgba(0,0,0,.4);z-index:20}
.grid-event::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(135deg,rgba(255,255,255,.12),transparent);opacity:0;transition:opacity .2s}
.grid-event:hover::before{opacity:1}
.grid-event .ge-icon{position:absolute;top:4px;right:8px;font-size:1rem;opacity:.5}
.grid-event .ge-title{font-weight:700;font-size:.75rem;line-height:1.2;padding-right:20px}
.grid-event .ge-time{font-size:.6rem;opacity:.75;font-weight:500;margin-top:1px}

@keyframes eventPop{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}

/* Particle */
.particle{position:fixed;width:4px;height:4px;border-radius:50%;pointer-events:none;z-index:0;animation:float linear infinite}
@keyframes float{0%{transform:translateY(100vh) rotate(0deg);opacity:0}10%{opacity:1}90%{opacity:1}100%{transform:translateY(-10vh) rotate(720deg);opacity:0}}

/* === MOBILE === */
@media(max-width:900px){
  .day-tabs{display:flex}
  .grid-container{grid-template-columns:40px 1fr}
  .grid-day-header{display:none}
  .grid-corner{display:none}
  .grid-time{width:40px;font-size:.55rem}
  .grid-hour.hidden-day{display:none}
  .grid-hour.visible-day{display:block}
  /* Show all hours for the active day */
}
@media(min-width:901px){
  .day-tabs{display:none}
  .grid-hour.hidden-day{display:block}
}
</style>
</head>
<body>

<div class="top-bar">
  <div class="top-bar-inner">
    <h1>🇪🇸 Barcelona 2026</h1>
    <div class="dates">Wed 27 – Sat 30 May</div>
  </div>
</div>

<!-- Mobile day tabs -->
<div class="day-tabs" id="dayTabs"></div>

<div class="calendar-wrap">
<div class="grid-container" id="calendar"></div>
</div>

<script>
const EVENTS = [
  {id:"flight-out",title:"Fly to Barcelona",day:"2026-05-27",start:"07:00",duration:195,icon:"✈️",colour:"#1E88E5",tag:"travel",detail:true},
  {id:"arrive-bcn",title:"Arrive in Barcelona",day:"2026-05-27",start:"10:15",duration:60,icon:"🛬",colour:"#43A047",tag:"travel",detail:true},
  {id:"checkin",title:"Check In",day:"2026-05-27",start:"16:00",duration:60,icon:"🏠",colour:"#FF7043",tag:"stays",detail:true},
  {id:"casa-batllo",title:"Casa Batlló",day:"2026-05-28",start:"09:00",duration:120,icon:"🏛️",colour:"#E040FB",tag:"sights",detail:true},
  {id:"checkout",title:"Checkout",day:"2026-05-30",start:"10:00",duration:30,icon:"🔑",colour:"#78909C",tag:"stays",detail:false},
  {id:"flight-home",title:"Fly Home",day:"2026-05-30",start:"10:50",duration:90,icon:"✈️",colour:"#1E88E5",tag:"travel",detail:true}
];

const DAYS = [
  {date:"2026-05-27",name:"WED",num:"27",month:"May",full:"Wednesday",photo:"img/gothic.jpg"},
  {date:"2026-05-28",name:"THU",num:"28",month:"May",full:"Thursday",photo:"img/casabatllo.jpg"},
  {date:"2026-05-29",name:"FRI",num:"29",month:"May",full:"Friday",photo:"img/barceloneta.jpg"},
  {date:"2026-05-30",name:"SAT",num:"30",month:"May",full:"Saturday",photo:"img/sagrada.jpg"}
];

const START_HOUR = 6;
const END_HOUR = 24;
const HOUR_H = 60;

function timeToMin(t){const[h,m]=t.split(":").map(Number);return h*60+m}
function formatEnd(start,dur){const m=timeToMin(start)+dur;return`${String(Math.floor(m/60)%24).padStart(2,"0")}:${String(m%60).padStart(2,"0")}`}

let activeDay = 0;

function buildCalendar(){
  const cal = document.getElementById("calendar");
  cal.innerHTML = "";

  const isMobile = window.innerWidth <= 900;

  // Corner cell
  const corner = document.createElement("div");
  corner.className = "grid-corner";
  cal.appendChild(corner);

  // Day headers
  DAYS.forEach((day,di) => {
    const hdr = document.createElement("div");
    hdr.className = "grid-day-header";
    hdr.dataset.day = di;
    if(isMobile && di !== activeDay) hdr.style.display = "none";
    hdr.innerHTML = `<img class="dh-photo" src="${day.photo}" alt="" onerror="this.style.display='none'"><div class="dh-name">${day.name}</div><div class="dh-num">${day.num}</div><div class="dh-month">${day.month}</div>`;
    cal.appendChild(hdr);
  });

  // Hours
  for(let h = START_HOUR; h < END_HOUR; h++){
    // Time label
    const timeCell = document.createElement("div");
    timeCell.className = "grid-time";
    timeCell.textContent = `${String(h).padStart(2,"0")}:00`;
    cal.appendChild(timeCell);

    // Day hour cells
    DAYS.forEach((day,di) => {
      const cell = document.createElement("div");
      cell.className = "grid-hour";
      cell.dataset.day = di;
      cell.dataset.hour = h;

      if(isMobile && di !== activeDay){
        cell.classList.add("hidden-day");
      } else {
        cell.classList.add("visible-day");
      }

      cal.appendChild(cell);
    });
  }

  // Place events
  EVENTS.forEach((ev, idx) => {
    const dayIdx = DAYS.findIndex(d => d.date === ev.day);
    if(dayIdx === -1) return;
    if(isMobile && dayIdx !== activeDay) return;

    const startMin = timeToMin(ev.start);
    const startHour = Math.floor(startMin / 60);
    const startOffsetMin = startMin - startHour * 60;
    const topOffset = (startOffsetMin / 60) * HOUR_H;

    // Find the correct hour cell for this day+hour
    const cell = cal.querySelector(`.grid-hour[data-day="${dayIdx}"][data-hour="${startHour}"]`);
    if(!cell) return;

    const el = document.createElement("a");
    el.href = ev.detail ? `${ev.id}.html` : "#";
    if(!ev.detail) el.onclick = (e) => e.preventDefault();
    el.className = "grid-event";
    el.style.backgroundColor = ev.colour;
    el.style.height = Math.max(30, (ev.duration / 60) * HOUR_H) + "px";
    el.style.top = topOffset + "px";
    el.style.animationDelay = `${0.2 + idx * 0.08}s`;

    el.innerHTML = `<span class="ge-icon">${ev.icon}</span><div class="ge-title">${ev.title}</div><div class="ge-time">${ev.start} – ${formatEnd(ev.start,ev.duration)}</div>`;

    cell.appendChild(el);
  });

  // Build mobile tabs
  if(isMobile) buildMobileTabs();
}

function buildMobileTabs(){
  const tabs = document.getElementById("dayTabs");
  tabs.innerHTML = "";
  DAYS.forEach((day,di) => {
    const tab = document.createElement("button");
    tab.className = "day-tab" + (di === activeDay ? " active" : "");
    tab.innerHTML = `<img class="tab-photo" src="${day.photo}" alt="" onerror="this.style.display='none'"><span class="tab-text">${day.name} ${day.num}</span>`;
    tab.onclick = () => { activeDay = di; buildCalendar(); };
    tabs.appendChild(tab);
  });
}

// Particles
function createParticles(){
  const colours = ['#ff6b6b33','#5b8def33','#a855f733','#4ecdc433','#fb923c33'];
  for(let i=0;i<10;i++){
    const p=document.createElement('div');p.className='particle';
    p.style.left=Math.random()*100+'%';p.style.animationDuration=(15+Math.random()*25)+'s';
    p.style.animationDelay=Math.random()*10+'s';p.style.background=colours[Math.floor(Math.random()*colours.length)];
    p.style.width=(3+Math.random()*4)+'px';p.style.height=p.style.width;
    document.body.appendChild(p);
  }
}

buildCalendar();
createParticles();

let resizeTimer;
window.addEventListener("resize",()=>{clearTimeout(resizeTimer);resizeTimer=setTimeout(buildCalendar,200)});
</script>
</body>
</html>
