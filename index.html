<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🇪🇸 Barcelona 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0e1a;--surface:#131829;--surface2:#1a2035;--border:#252d45;--text:#e8eaf0;--text2:#8892b0;--accent:#ff6b6b;--accent2:#4ecdc4;--hour-h:60px}
body{font-family:'Poppins',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse at 20% 50%,rgba(91,141,239,.06) 0%,transparent 50%),radial-gradient(ellipse at 80% 20%,rgba(168,85,247,.06) 0%,transparent 50%);pointer-events:none;z-index:0}

.top-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 20px;position:sticky;top:0;z-index:100;backdrop-filter:blur(20px)}
.top-bar-inner{max-width:1600px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.top-bar h1{font-size:1.3rem;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.top-bar .dates{font-size:.8rem;color:var(--text2);font-weight:500}

.day-tabs{display:flex;overflow-x:auto;gap:8px;padding:12px 16px;position:relative;z-index:1}
.day-tab{flex-shrink:0;padding:10px 20px;border-radius:12px;background:var(--surface);border:1px solid var(--border);color:var(--text2);font-family:'Poppins',sans-serif;font-size:.75rem;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap;display:flex;align-items:center;gap:6px;position:relative;overflow:hidden;min-height:40px}
.day-tab .tab-photo{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;opacity:.25;transition:opacity .3s}
.day-tab.active .tab-photo{opacity:.5}
.day-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.day-tab .tab-text{position:relative;z-index:1}

.calendar-wrap{max-width:1600px;margin:0 auto;padding:16px;position:relative;z-index:1}

/* === DESKTOP GRID === */
.grid-container{display:grid;grid-template-columns:50px repeat(4,1fr);gap:0;border-radius:16px;overflow:hidden;background:var(--surface);border:1px solid var(--border)}
.grid-corner{background:var(--surface);border-bottom:1px solid var(--border);border-right:1px solid var(--border);height:var(--hour-h);display:flex;align-items:center;justify-content:center;font-size:.55rem;color:var(--text2)}
.grid-day-header{background:var(--surface);border-bottom:1px solid var(--border);padding:8px 4px;text-align:center;height:100px;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden}
.grid-day-header .dh-photo{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;opacity:.4;transition:opacity .3s}
.grid-day-header:hover .dh-photo{opacity:.6}
.grid-day-header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:70%;background:linear-gradient(transparent,var(--surface));z-index:1}
.grid-day-header .dh-name{font-size:.6rem;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;color:var(--text2);position:relative;z-index:2}
.grid-day-header .dh-num{font-size:1.4rem;font-weight:900;line-height:1.1;position:relative;z-index:2}
.grid-day-header .dh-month{font-size:.65rem;color:var(--text2);font-weight:500;position:relative;z-index:2}
.grid-time{background:var(--surface);border-right:1px solid var(--border);border-bottom:1px solid rgba(255,255,255,.03);height:var(--hour-h);display:flex;align-items:flex-start;justify-content:flex-end;padding:4px 8px 0 0;font-size:.6rem;color:var(--text2);opacity:.5}
.grid-hour{border-right:1px solid var(--border);border-bottom:1px solid rgba(255,255,255,.03);height:var(--hour-h);position:relative}
.grid-hour:nth-child(odd){background:rgba(255,255,255,.01)}
.grid-event{position:absolute;left:3px;right:3px;border-radius:10px;padding:6px 10px;overflow:hidden;cursor:pointer;z-index:10;text-decoration:none;color:#fff;transition:transform .15s,box-shadow .15s;display:flex;flex-direction:column;justify-content:center;animation:eventPop .4s ease both}
.grid-event:hover{transform:scale(1.03);box-shadow:0 6px 24px rgba(0,0,0,.4);z-index:20}
.grid-event::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(135deg,rgba(255,255,255,.12),transparent);opacity:0;transition:opacity .2s}
.grid-event:hover::before{opacity:1}
.grid-event .ge-icon{position:absolute;top:4px;right:8px;font-size:1rem;opacity:.5}
.grid-event .ge-title{font-weight:700;font-size:.75rem;line-height:1.2;padding-right:20px}
.grid-event .ge-time{font-size:.6rem;opacity:.75;font-weight:500;margin-top:1px}

/* === MOBILE SLIDER === */
.mobile-slider{display:none;position:relative;overflow:hidden}
.slider-track{display:flex;transition:transform .35s cubic-bezier(.25,.8,.25,1)}
.slider-track.dragging{transition:none}
.slide{min-width:100%;flex-shrink:0}

.slide-header{position:relative;height:120px;overflow:hidden}
.slide-header img{width:100%;height:100%;object-fit:cover;opacity:.5}
.slide-header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:70%;background:linear-gradient(transparent,var(--surface))}
.slide-header-info{position:absolute;bottom:12px;left:16px;z-index:2}
.slide-header-info .sh-name{font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:2px;color:var(--text2)}
.slide-header-info .sh-date{font-size:1.8rem;font-weight:900;line-height:1}
.slide-header-info .sh-month{font-size:.85rem;color:var(--text2);font-weight:500}

.slide-grid{background:var(--surface);border:1px solid var(--border);border-top:none;border-radius:0 0 16px 16px;overflow:hidden}
.slide-row{display:flex;border-bottom:1px solid rgba(255,255,255,.03);min-height:var(--hour-h);position:relative}
.slide-row:nth-child(odd){background:rgba(255,255,255,.01)}
.slide-time-label{width:44px;flex-shrink:0;display:flex;align-items:flex-start;justify-content:flex-end;padding:4px 6px 0 0;font-size:.6rem;color:var(--text2);opacity:.5;border-right:1px solid var(--border)}
.slide-cell{flex:1;position:relative;min-height:var(--hour-h)}

.slide-event{position:absolute;left:4px;right:4px;border-radius:10px;padding:8px 10px;overflow:hidden;cursor:pointer;z-index:10;text-decoration:none;color:#fff;display:flex;flex-direction:column;justify-content:center;animation:eventPop .4s ease both}
.slide-event:active{transform:scale(.97)}
.slide-event .se-icon{position:absolute;top:6px;right:8px;font-size:1.1rem;opacity:.5}
.slide-event .se-title{font-weight:700;font-size:.82rem;line-height:1.2;padding-right:22px}
.slide-event .se-time{font-size:.65rem;opacity:.8;font-weight:500;margin-top:2px}

.slide-dots{display:flex;justify-content:center;gap:8px;padding:16px 0}
.slide-dot{width:8px;height:8px;border-radius:50%;background:var(--border);transition:all .3s;cursor:pointer}
.slide-dot.active{background:var(--accent);transform:scale(1.3)}

@keyframes eventPop{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.particle{position:fixed;width:4px;height:4px;border-radius:50%;pointer-events:none;z-index:0;animation:float linear infinite}
@keyframes float{0%{transform:translateY(100vh) rotate(0deg);opacity:0}10%{opacity:1}90%{opacity:1}100%{transform:translateY(-10vh) rotate(720deg);opacity:0}}

@media(max-width:900px){
  .grid-container{display:none!important}
  .mobile-slider{display:block!important}
}
@media(min-width:901px){
  .grid-container{display:grid!important}
  .mobile-slider{display:none!important}
  .slide-dots{display:none!important}
}
</style>
</head>
<body>

<div class="top-bar">
  <div class="top-bar-inner">
    <h1>🇪🇸 Barcelona 2026</h1>
    <div class="dates">Wed 27 – Sat 30 May</div>
  </div>
</div>

<div class="day-tabs" id="dayTabs"></div>

<div class="calendar-wrap">
  <div class="grid-container" id="calendar"></div>
  <div class="mobile-slider" id="mobileSlider">
    <div class="slider-track" id="sliderTrack"></div>
    <div class="slide-dots" id="slideDots"></div>
  </div>
</div>

<script>
const EVENTS = [
  {id:"flight-out",title:"Fly to Barcelona",day:"2026-05-27",start:"07:00",duration:195,icon:"✈️",colour:"#1E88E5",tag:"travel",detail:true},
  {id:"arrive-bcn",title:"Arrive in Barcelona",day:"2026-05-27",start:"10:15",duration:60,icon:"🛬",colour:"#43A047",tag:"travel",detail:true},
  {id:"checkin",title:"Check In",day:"2026-05-27",start:"16:00",duration:60,icon:"🏠",colour:"#FF7043",tag:"stays",detail:true},
  {id:"casa-batllo",title:"Casa Batlló",day:"2026-05-28",start:"09:00",duration:120,icon:"🏛️",colour:"#E040FB",tag:"sights",detail:true},
  {id:"magic-fountain-thu",title:"Magic Fountain",day:"2026-05-28",start:"20:00",duration:60,icon:"⛲",colour:"#4ECDC4",tag:"sights",detail:true},
  {id:"magic-fountain-fri",title:"Magic Fountain",day:"2026-05-29",start:"20:00",duration:60,icon:"⛲",colour:"#4ECDC4",tag:"sights",detail:true},
  {id:"checkout",title:"Checkout",day:"2026-05-30",start:"10:00",duration:30,icon:"🔑",colour:"#78909C",tag:"stays",detail:false},
  {id:"flight-home",title:"Fly Home",day:"2026-05-30",start:"10:50",duration:90,icon:"✈️",colour:"#1E88E5",tag:"travel",detail:true}
];

const DAYS = [
  {date:"2026-05-27",name:"WED",num:"27",month:"May",full:"Wednesday",photo:"img/gothic.jpg"},
  {date:"2026-05-28",name:"THU",num:"28",month:"May",full:"Thursday",photo:"img/casabatllo.jpg"},
  {date:"2026-05-29",name:"FRI",num:"29",month:"May",full:"Friday",photo:"img/barceloneta.jpg"},
  {date:"2026-05-30",name:"SAT",num:"30",month:"May",full:"Saturday",photo:"img/sagrada.jpg"}
];

const START_HOUR = 6;
const END_HOUR = 24;
const HOUR_H = 60;

function timeToMin(t){const[h,m]=t.split(":").map(Number);return h*60+m}
function formatEnd(start,dur){const m=timeToMin(start)+dur;return`${String(Math.floor(m/60)%24).padStart(2,"0")}:${String(m%60).padStart(2,"0")}`}

/* ========== DESKTOP GRID ========== */
function buildDesktopGrid(){
  const cal = document.getElementById("calendar");
  cal.innerHTML = "";
  const corner = document.createElement("div"); corner.className = "grid-corner"; cal.appendChild(corner);
  DAYS.forEach(day => {
    const hdr = document.createElement("div"); hdr.className = "grid-day-header";
    hdr.innerHTML = `<img class="dh-photo" src="${day.photo}" alt="" onerror="this.style.display='none'"><div class="dh-name">${day.name}</div><div class="dh-num">${day.num}</div><div class="dh-month">${day.month}</div>`;
    cal.appendChild(hdr);
  });
  for(let h = START_HOUR; h < END_HOUR; h++){
    const tc = document.createElement("div"); tc.className = "grid-time"; tc.textContent = `${String(h).padStart(2,"0")}:00`; cal.appendChild(tc);
    DAYS.forEach((day,di) => {
      const cell = document.createElement("div"); cell.className = "grid-hour"; cell.dataset.day = di; cell.dataset.hour = h; cal.appendChild(cell);
    });
  }
  EVENTS.forEach((ev,idx) => {
    const dayIdx = DAYS.findIndex(d => d.date === ev.day); if(dayIdx === -1) return;
    const startMin = timeToMin(ev.start); const startHour = Math.floor(startMin/60);
    const topOffset = ((startMin - startHour*60)/60)*HOUR_H;
    const cell = cal.querySelector(`.grid-hour[data-day="${dayIdx}"][data-hour="${startHour}"]`); if(!cell) return;
    const el = document.createElement("a"); el.href = ev.detail ? `${ev.id}.html` : "#";
    if(!ev.detail) el.onclick = e => e.preventDefault();
    el.className = "grid-event"; el.style.backgroundColor = ev.colour;
    el.style.height = Math.max(30,(ev.duration/60)*HOUR_H)+"px"; el.style.top = topOffset+"px";
    el.style.animationDelay = `${0.2+idx*0.08}s`;
    el.innerHTML = `<span class="ge-icon">${ev.icon}</span><div class="ge-title">${ev.title}</div><div class="ge-time">${ev.start} – ${formatEnd(ev.start,ev.duration)}</div>`;
    cell.appendChild(el);
  });
}

/* ========== MOBILE SLIDER ========== */
let currentSlide = 0;
let touchStartX = 0, touchStartY = 0, touchCurrentX = 0;
let isDragging = false, isHorizontalSwipe = null;

function buildMobileSlider(){
  const track = document.getElementById("sliderTrack");
  const dots = document.getElementById("slideDots");
  track.innerHTML = ""; dots.innerHTML = "";

  DAYS.forEach((day, di) => {
    const slide = document.createElement("div"); slide.className = "slide";

    // Photo header
    const header = document.createElement("div"); header.className = "slide-header";
    header.innerHTML = `<img src="${day.photo}" alt="" onerror="this.style.display='none'"><div class="slide-header-info"><div class="sh-name">${day.name}</div><div class="sh-date">${day.num}</div><div class="sh-month">${day.month}</div></div>`;
    slide.appendChild(header);

    // Time grid
    const grid = document.createElement("div"); grid.className = "slide-grid";
    const dayEvents = EVENTS.filter(e => e.day === day.date).sort((a,b) => timeToMin(a.start)-timeToMin(b.start));

    for(let h = START_HOUR; h < END_HOUR; h++){
      const row = document.createElement("div"); row.className = "slide-row";
      const label = document.createElement("div"); label.className = "slide-time-label"; label.textContent = `${String(h).padStart(2,"0")}:00`;
      const cell = document.createElement("div"); cell.className = "slide-cell"; cell.dataset.hour = h;
      row.appendChild(label); row.appendChild(cell); grid.appendChild(row);
    }

    // Place events
    dayEvents.forEach((ev,ei) => {
      const startMin = timeToMin(ev.start);
      const startHour = Math.floor(startMin/60);
      const topOffset = ((startMin - startHour*60)/60)*HOUR_H;
      const cell = grid.querySelector(`.slide-cell[data-hour="${startHour}"]`); if(!cell) return;
      const el = document.createElement("a"); el.href = ev.detail ? `${ev.id}.html` : "#";
      if(!ev.detail) el.onclick = e => e.preventDefault();
      el.className = "slide-event"; el.style.backgroundColor = ev.colour;
      el.style.height = Math.max(30,(ev.duration/60)*HOUR_H)+"px"; el.style.top = topOffset+"px";
      el.style.animationDelay = `${0.1+ei*0.08}s`;
      el.innerHTML = `<span class="se-icon">${ev.icon}</span><div class="se-title">${ev.title}</div><div class="se-time">${ev.start} – ${formatEnd(ev.start,ev.duration)}</div>`;
      cell.appendChild(el);
    });

    slide.appendChild(grid); track.appendChild(slide);

    // Dot
    const dot = document.createElement("div"); dot.className = "slide-dot" + (di === currentSlide ? " active" : "");
    dot.onclick = () => goToSlide(di); dots.appendChild(dot);
  });

  goToSlide(currentSlide, false);
  setupSwipe();
}

function goToSlide(index, animate = true){
  currentSlide = Math.max(0, Math.min(index, DAYS.length - 1));
  const track = document.getElementById("sliderTrack");
  if(animate) track.classList.remove("dragging");
  track.style.transform = `translateX(-${currentSlide * 100}%)`;
  document.querySelectorAll(".slide-dot").forEach((d,i) => d.classList.toggle("active", i === currentSlide));
  document.querySelectorAll(".day-tab").forEach((t,i) => t.classList.toggle("active", i === currentSlide));
}

function setupSwipe(){
  const slider = document.getElementById("mobileSlider");
  slider.removeEventListener("touchstart", onTouchStart);
  slider.removeEventListener("touchmove", onTouchMove);
  slider.removeEventListener("touchend", onTouchEnd);
  slider.addEventListener("touchstart", onTouchStart, {passive: false});
  slider.addEventListener("touchmove", onTouchMove, {passive: false});
  slider.addEventListener("touchend", onTouchEnd);
}

function onTouchStart(e){ touchStartX=e.touches[0].clientX; touchStartY=e.touches[0].clientY; touchCurrentX=touchStartX; isDragging=true; isHorizontalSwipe=null; }
function onTouchMove(e){
  if(!isDragging) return;
  const dx=e.touches[0].clientX-touchStartX, dy=e.touches[0].clientY-touchStartY;
  if(isHorizontalSwipe===null && (Math.abs(dx)>8||Math.abs(dy)>8)) isHorizontalSwipe=Math.abs(dx)>Math.abs(dy);
  if(!isHorizontalSwipe) return;
  e.preventDefault(); touchCurrentX=e.touches[0].clientX;
  const track=document.getElementById("sliderTrack"); track.classList.add("dragging");
  const offset=-currentSlide*100+(dx/sliderWidth()*100);
  track.style.transform=`translateX(${offset}%)`;
}
function onTouchEnd(){
  if(!isDragging) return; isDragging=false;
  const track=document.getElementById("sliderTrack"); track.classList.remove("dragging");
  if(!isHorizontalSwipe){goToSlide(currentSlide);return;}
  const dx=touchCurrentX-touchStartX, threshold=sliderWidth()*0.15;
  if(dx>threshold&&currentSlide>0) goToSlide(currentSlide-1);
  else if(dx<-threshold&&currentSlide<DAYS.length-1) goToSlide(currentSlide+1);
  else goToSlide(currentSlide);
}
function sliderWidth(){return document.getElementById("mobileSlider").offsetWidth||window.innerWidth;}

/* ========== DAY TABS ========== */
function buildDayTabs(){
  const tabs = document.getElementById("dayTabs"); tabs.innerHTML = "";
  DAYS.forEach((day,di) => {
    const tab = document.createElement("button"); tab.className = "day-tab" + (di === currentSlide ? " active" : "");
    tab.innerHTML = `<img class="tab-photo" src="${day.photo}" alt="" onerror="this.style.display='none'"><span class="tab-text">${day.name} ${day.num}</span>`;
    tab.onclick = () => goToSlide(di); tabs.appendChild(tab);
  });
}

/* ========== PARTICLES ========== */
function createParticles(){
  const colours = ['#ff6b6b33','#5b8def33','#a855f733','#4ecdc433','#fb923c33'];
  for(let i=0;i<10;i++){
    const p=document.createElement('div');p.className='particle';
    p.style.left=Math.random()*100+'%';p.style.animationDuration=(15+Math.random()*25)+'s';
    p.style.animationDelay=Math.random()*10+'s';p.style.background=colours[Math.floor(Math.random()*colours.length)];
    p.style.width=(3+Math.random()*4)+'px';p.style.height=p.style.width;
    document.body.appendChild(p);
  }
}

buildDesktopGrid();
buildDayTabs();
buildMobileSlider();
createParticles();

let resizeTimer;
window.addEventListener("resize",()=>{clearTimeout(resizeTimer);resizeTimer=setTimeout(()=>{buildDesktopGrid();buildDayTabs();buildMobileSlider();},200)});
</script>
</body>
</html>
