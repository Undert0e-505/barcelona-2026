<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧭 Things to Do — Barcelona 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0e1a;--surface:#131829;--surface2:#1a2035;--border:#252d45;--text:#e8eaf0;--text2:#8892b0;--accent:#ff6b6b;--accent2:#4ecdc4}
body{font-family:'Poppins',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:68px}
body::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse at 20% 50%,rgba(91,141,239,.06) 0%,transparent 50%),radial-gradient(ellipse at 80% 20%,rgba(168,85,247,.06) 0%,transparent 50%);pointer-events:none;z-index:0}

.top-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 20px;position:sticky;top:0;z-index:100;backdrop-filter:blur(20px)}
.top-bar-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.top-bar h1{font-size:1.3rem;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.top-bar .dates{font-size:.8rem;color:var(--text2);font-weight:500}

.back-link{display:inline-flex;align-items:center;gap:6px;color:var(--accent);text-decoration:none;font-weight:600;font-size:.85rem;transition:transform .2s}
.back-link:hover{transform:translateX(-4px)}

.page-header{max-width:1200px;margin:24px auto 0;padding:0 20px}
.page-header h2{font-size:1.6rem;font-weight:800;margin-bottom:4px}
.page-header p{color:var(--text2);font-size:.88rem;line-height:1.5}

/* Category columns */
.categories{max-width:1200px;margin:24px auto;padding:0 20px}
.category-section{margin-bottom:32px}
.category-title{font-size:1rem;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.category-title .ct-emoji{font-size:1.2rem}

/* Desktop: columns per category */
.categories-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:24px}
.categories-grid .category-section{margin-bottom:0}

/* Activity cards */
.activity-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;cursor:pointer;text-decoration:none;color:var(--text);display:flex;transition:transform .2s,box-shadow .2s;animation:fadeUp .5s ease both}
.activity-card:hover{transform:translateY(-4px);box-shadow:0 8px 32px rgba(0,0,0,.4)}
.activity-card-img{width:100px;min-height:100px;flex-shrink:0;object-fit:cover}
.activity-card-body{padding:14px 16px;display:flex;flex-direction:column;justify-content:center;flex:1;min-width:0}
.activity-card-title{font-weight:700;font-size:.92rem;line-height:1.3;margin-bottom:4px}
.activity-card-tag{font-size:.65rem;font-weight:600;text-transform:uppercase;letter-spacing:1px;opacity:.6}
.activity-card-desc{font-size:.78rem;color:var(--text2);line-height:1.4;margin-top:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

.category-list{display:flex;flex-direction:column;gap:12px}

@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.particle{position:fixed;width:4px;height:4px;border-radius:50%;pointer-events:none;z-index:0;animation:float linear infinite}
@keyframes float{0%{transform:translateY(100vh) rotate(0deg);opacity:0}10%{opacity:1}90%{opacity:1}100%{transform:translateY(-10vh) rotate(720deg);opacity:0}}

@media(max-width:900px){
  .categories-grid{grid-template-columns:1fr}
  .activity-card-img{width:90px;min-height:90px}
}

/* Transport bar (same as index) */
.transport-bar{position:fixed;bottom:0;left:0;right:0;z-index:200;background:var(--surface);border-top:1px solid var(--border);padding:10px 16px;display:flex;justify-content:center;gap:12px;backdrop-filter:blur(20px)}
.transport-btn{display:flex;align-items:center;gap:8px;padding:10px 20px;border-radius:12px;background:var(--surface2);border:1px solid var(--border);color:var(--text);text-decoration:none;font-family:'Poppins',sans-serif;font-size:.82rem;font-weight:600;transition:all .2s;cursor:pointer}
.transport-btn:hover{background:var(--accent2);color:#fff;border-color:var(--accent2);transform:translateY(-2px)}
.transport-btn .tb-icon{font-size:1.2rem}
</style>
</head>
<body>

<div class="top-bar">
  <div class="top-bar-inner">
    <h1>🇪🇸 Barcelona 2026</h1>
    <div class="dates">Wed 27 – Sat 30 May</div>
  </div>
</div>

<div class="page-header">
  <a class="back-link" href="index.html">← Back to itinerary</a>
  <h2 style="margin-top:12px">🧭 Things to Do</h2>
  <p>Activities we want to fit in — not tied to a specific time yet. May get scheduled closer to the trip.</p>
</div>

<div class="categories" id="categories"></div>

<script>
const UNSCHEDULED = [
  {id:"bunkers",title:"Bunkers del Carmel",desc:"Civil war anti-aircraft battery turned panoramic viewpoint — the best 360° views of Barcelona",cat:"sights",icon:"🔭",colour:"#E040FB",img:"img/bunkers.jpg"},
  {id:"montjuic-castle",title:"Montjuïc Castle",desc:"Hilltop fortress with 360° views, reached by cable car — exhibitions, dungeons, and Catalan history",cat:"sights",icon:"🏰",colour:"#E040FB",img:"img/montjuic.jpg"},
  {id:"picasso",title:"Museu Picasso",desc:"Over 4,000 works in five medieval palaces — the world's most extensive Picasso collection in the Gothic Quarter",cat:"sights",icon:"🎨",colour:"#E040FB",img:"img/picasso.jpg"},
  {id:"park-guell",title:"Park Güell",desc:"Gaudí's surreal mosaic park — the famous salamander, twisting viaducts, and Barcelona's best city views",cat:"sights",icon:"🦎",colour:"#E040FB",img:"img/parkguell.jpg"},
  {id:"tibidabo",title:"Tibidabo",desc:"Vintage amusement park on a mountain top — roller coasters, panoramic views, and a church since 1899",cat:"activities",icon:"🎢",colour:"#FF7043",img:"img/tibidabo.jpg"},
  {id:"granja-dulcinea",title:"Granja Dulcinea",desc:"Legendary churros & thick hot chocolate on Barcelona's historic Chocolate Street since 1941",cat:"food",icon:"🍫",colour:"#FB923C",img:"img/granja-dulcinea.jpg"},
  {id:"boqueria",title:"Mercat de la Boqueria",desc:"Barcelona's most famous food market — fresh seafood, jamón, fruit juices, and tapas bars on La Rambla",cat:"food",icon:"🥘",colour:"#FB923C",img:"img/boqueria.jpg"},
  {id:"costa-brava-kayak",title:"Costa Brava Kayak & Snorkel",desc:"Day trip from Barcelona — kayak through sea caves, snorkel marine reserves, picnic lunch on white sand",cat:"activities",icon:"🛶",colour:"#FF7043",img:"img/costa-brava.jpg"},
  {id:"poblenou-street-art",title:"Poblenou Street Art Walk",desc:"Self-guided walking route through Barcelona's best street art district — murals, factory studios, ever-changing walls",cat:"activities",icon:"🎨",colour:"#FF7043",img:"img/poblenou-streetart.jpg"},
];

const CATS = {
  sights: {emoji:"🏛️",label:"Sights",colour:"#E040FB"},
  food: {emoji:"🍽️",label:"Food & Drink",colour:"#FB923C"},
  beach: {emoji:"🏖️",label:"Beach",colour:"#4ECDC4"},
  activities: {emoji:"🎯",label:"Activities",colour:"#FF7043"},
  shopping: {emoji:"🛍️",label:"Shopping",colour:"#F59E0B"},
  nightlife: {emoji:"🌙",label:"Nightlife",colour:"#FF6B6B"},
  relax: {emoji:"😌",label:"Relax",colour:"#34D399"},
};

function build(){
  const container = document.getElementById("categories");

  // Group by category
  const groups = {};
  UNSCHEDULED.forEach(item => {
    if(!groups[item.cat]) groups[item.cat] = [];
    groups[item.cat].push(item);
  });

  // Desktop: grid of category columns
  const grid = document.createElement("div");
  grid.className = "categories-grid";

  Object.keys(groups).forEach(catKey => {
    const cat = CATS[catKey] || {emoji:"📌",label:catKey,colour:"#78909C"};
    const section = document.createElement("div");
    section.className = "category-section";

    const title = document.createElement("div");
    title.className = "category-title";
    title.style.color = cat.colour;
    title.innerHTML = `<span class="ct-emoji">${cat.emoji}</span> ${cat.label}`;
    section.appendChild(title);

    const list = document.createElement("div");
    list.className = "category-list";

    groups[catKey].forEach((item,idx) => {
      const card = document.createElement("a");
      card.href = `${item.id}.html`;
      card.className = "activity-card";
      card.style.animationDelay = `${0.1 + idx * 0.08}s`;
      card.innerHTML = `
        <img class="activity-card-img" src="${item.img}" alt="${item.title}" onerror="this.style.display='none'">
        <div class="activity-card-body">
          <div class="activity-card-title">${item.icon} ${item.title}</div>
          <div class="activity-card-tag" style="color:${cat.colour}">${cat.label}</div>
          <div class="activity-card-desc">${item.desc}</div>
        </div>`;
      list.appendChild(card);
    });

    section.appendChild(list);
    grid.appendChild(section);
  });

  container.appendChild(grid);
}

build();

// Particles
const colours = ['#ff6b6b33','#5b8def33','#a855f733','#4ecdc433','#fb923c33'];
for(let i=0;i<10;i++){
  const p=document.createElement('div');p.className='particle';
  p.style.left=Math.random()*100+'%';p.style.animationDuration=(15+Math.random()*25)+'s';
  p.style.animationDelay=Math.random()*10+'s';p.style.background=colours[Math.floor(Math.random()*colours.length)];
  p.style.width=(3+Math.random()*4)+'px';p.style.height=p.style.width;
  document.body.appendChild(p);
}
</script>

<div class="transport-bar">
  <a class="transport-btn" href="maps.html">
    <span class="tb-icon">🚇</span> Metro
  </a>
  <a class="transport-btn" href="maps.html#rodalies">
    <span class="tb-icon">🚆</span> Trains
  </a>
</div>

</body>
</html>
